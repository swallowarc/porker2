worker_processes 1;
error_log /tmp/nginx_error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # HTTP/1.1: health check + 静的アセット（Envoy Gateway からは使わない）
    server {
        listen 8081;

        location = /health {
            access_log off;
            return 200 "ok";
        }

        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;

            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # h2c (HTTP/2 prior-knowledge): Envoy Gateway はこちらに来る
    server {
        listen 8082;
        http2 on;

        # 静的アセットも h2 で配信できるようにする
        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;

            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # gRPC は pure gRPC として Connect server に転送
        # (EG の grpc_web filter が HTTP/2 trailers ↔ trailers-in-body frame の変換を担う)
        location /porker.v2.Porker2Service/ {
            grpc_pass grpc://localhost:8080;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_set_header X-Forwarded-Proto $scheme;

            grpc_read_timeout  3600s;
            grpc_send_timeout  3600s;
            client_max_body_size 16m;
        }
    }
}
