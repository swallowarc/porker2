version: v2
plugins:
  - local: protoc-gen-go
    out: backend/internal/interface/pb
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: backend/internal/interface/pb
    opt: paths=source_relative
  - local: protoc-gen-dart
    out: frontend/lib/data/datasource/pb
    opt:
      - grpc
