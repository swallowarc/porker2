name: Docker Build and Push

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to registry'
        required: false
        default: 'false'

env:
  DOCKER_IMAGE: swallowarc/porker2
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

  release:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Docker Image
            
            `${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}`
            
            マルチアーキテクチャサポート: `linux/amd64`, `linux/arm64`
            
            ### 使用方法
            
            ```bash
            docker run -d \
              --name porker2 \
              -p 8080:8080 \
              -p 80:80 \
              -e ENV=production \
              -e REDIS_HOST_PORT=redis:6379 \
              -e REDIS_DB=0 \
              -e CONNECT_CORS_ALLOW_ORIGINS=http://localhost \
              -e SESSION_COOKIE_DOMAIN=localhost \
              ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
            ```
            
            ### 環境変数
            
            | 変数名 | 説明 | デフォルト値 |
            |--------|------|------------|
            | `ENV` | 環境 (local/production) | local |
            | `REDIS_HOST_PORT` | Redisホスト:ポート | localhost:6379 |
            | `REDIS_DB` | Redis DBインデックス | 0 |
            | `CONNECT_PORT` | バックエンドポート | 8080 |
            | `CONNECT_CORS_ALLOW_ORIGINS` | CORS許可オリジン | 必須 |
            | `SESSION_COOKIE_DOMAIN` | クッキードメイン | localhost |
            
            詳細は [README.md](https://github.com/${{ github.repository }}) を参照してください。
