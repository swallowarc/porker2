name: Release

on:
  workflow_dispatch:

permissions:
  actions: read
  checks: read
  contents: write

env:
  DOCKER_IMAGE: swallowarc/porker2

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Wait for On Merge Main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list \
            --workflow=on-merge-main.yml \
            --commit="$GITHUB_SHA" \
            --json databaseId,status \
            --jq '[.[] | select(.status != "completed")] | .[0].databaseId // empty')
          if [ -n "$RUN_ID" ]; then
            echo "Waiting for On Merge Main (run $RUN_ID) to complete..."
            gh run watch "$RUN_ID" --exit-status --interval 30
          fi

      - name: Determine release version
        id: tag
        run: |
          LATEST=$(git ls-remote --tags origin 'v*' \
            | awk -F'refs/tags/' '{print $2}' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -n 1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS=. read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          VERSION="${NEXT#v}"
          echo "Release version: ${LATEST:-none} -> ${NEXT}"
          {
            echo "name=${NEXT}"
            echo "version=${VERSION}"
            echo "minor=${VERSION%.*}"
            echo "major=${VERSION%%.*}"
          } >> "$GITHUB_OUTPUT"

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag container images
        env:
          SHA_TAG: ${{ steps.sha.outputs.short }}
        run: |
          # docker pull/tag/push だとマニフェストが runner のアーキ単体に潰れるため、
          # imagetools create でマルチアーキのマニフェストリストごと再タグする
          docker buildx imagetools create \
            --tag "${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}" \
            --tag "${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.minor }}" \
            --tag "${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.major }}" \
            "${{ env.DOCKER_IMAGE }}:${SHA_TAG}"

      - name: Create and push git tag
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
        run: |
          # GITHUB_TOKEN によるタグ push は他のワークフローを起動しない仕様のため、
          # docker-build.yml の tags トリガー（手動タグ push 用）と二重実行にはならない
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Release ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          body: |
            ## Docker Image

            `${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}`

            マルチアーキテクチャサポート: `linux/amd64`, `linux/arm64`

            ### 使用方法

            ```bash
            docker run -d \
              --name porker2 \
              -p 8081:8081 \
              -p 8082:8082 \
              -e ENV=production \
              -e REDIS_HOST_PORT=redis:6379 \
              -e REDIS_DB=0 \
              -e CONNECT_CORS_ALLOW_ORIGINS=http://localhost \
              -e SESSION_COOKIE_DOMAIN=localhost \
              ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}
            ```

            ### 環境変数

            | 変数名 | 説明 | デフォルト値 |
            |--------|------|------------|
            | `ENV` | 環境 (local/production) | local |
            | `REDIS_HOST_PORT` | Redisホスト:ポート | localhost:6379 |
            | `REDIS_DB` | Redis DBインデックス | 0 |
            | `CONNECT_PORT` | バックエンドポート | 8080 |
            | `CONNECT_CORS_ALLOW_ORIGINS` | CORS許可オリジン | 必須 |
            | `SESSION_COOKIE_DOMAIN` | クッキードメイン | localhost |

            詳細は [README.md](https://github.com/${{ github.repository }}) を参照してください。
